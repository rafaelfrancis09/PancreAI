<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PancreAI - Unidade de medida</title>
    <link rel="stylesheet" href="unidade.css" />
    <link rel="stylesheet" href="pancreai-theme.css?v=20260710-animations1" />
    <link rel="stylesheet" href="pancreai-runtime.css?v=20260710-runtime1" />
    <link rel="stylesheet" href="pancreai-stability.css?v=20260710-stable1" />
  </head>
  <body>
    <main class="app" id="app">
      <section class="screen screen--unidade" aria-label="Unidade de medida">
        <header class="topbar">
          <button class="back-btn" id="backBtn" type="button" aria-label="Voltar">←</button>
          <h1>Unidade de medida</h1>
          <span aria-hidden="true"></span>
        </header>

        <p class="unidade-description">Escolha como deseja visualizar as quantidades de alimentos</p>

        <div class="unidade-options">
          <button class="unidade-option" data-value="gramas" type="button">
            <div class="unidade-option__content">
              <h2>Gramas (g)</h2>
              <p>Peso em gramas</p>
            </div>
            <div class="unidade-option__check"></div>
          </button>

          <button class="unidade-option" data-value="colheres" type="button">
            <div class="unidade-option__content">
              <h2>Colheres</h2>
              <p>Colheres de sopa</p>
            </div>
            <div class="unidade-option__check"></div>
          </button>

          <button class="unidade-option" data-value="porcoes" type="button">
            <div class="unidade-option__content">
              <h2>Porções</h2>
              <p>Porções estimadas</p>
            </div>
            <div class="unidade-option__check"></div>
          </button>
        </div>
      </section>
    </main>
    <script src="i18n.js?v=20260709-fulli18n2"></script>
    <script src="i18n-full.js?v=20260710-performance1"></script>
    <script src="app-core.js?v=20260709-child1"></script>
    <script src="child-mode-guard.js?v=20260709-child1"></script>
    <script src="unidade.js"></script>
  </body>
</html>
