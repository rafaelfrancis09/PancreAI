<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PancreAI - Lembretes de refeições</title>
    <link rel="stylesheet" href="lembrete.css?v=20260709-nonav1" />
    <link rel="stylesheet" href="pancreai-theme.css?v=20260710-animations1" />
    <link rel="stylesheet" href="pancreai-runtime.css?v=20260710-runtime1" />
    <link rel="stylesheet" href="pancreai-stability.css?v=20260710-stable1" />
  </head>
  <body>
    <main class="app" id="app">
      <section class="screen screen--reminder" aria-label="Lembretes de refeições">
        <header class="topbar">
          <button class="back-btn" id="backBtn" type="button" aria-label="Voltar" data-pa-icon="back">
            <svg class="app-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"></path></svg>
          </button>
          <h1>Lembretes de refeições</h1>
          <span aria-hidden="true"></span>
        </header>

        <p class="lead">
          Configure lembretes para não esquecer de tomar suas enzimas antes das refeições.
        </p>

        <section class="reminder-list" id="reminderList" aria-label="Horários cadastrados"></section>

        <button class="add-reminder-btn" id="addReminderBtn" type="button">
          <span class="add-reminder-btn__icon" data-pa-icon="add" aria-hidden="true">
            <svg class="app-icon" viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
          </span>
          <span class="add-reminder-btn__label">Adicionar horário</span>
        </button>

        <nav class="bottom-nav" aria-label="Navegação inferior">
          <button class="bottom-nav__item" id="historyNav" type="button" data-pa-icon="history">
            <svg class="app-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v5h5"></path><path d="M12 7v5l3 2"></path></svg>
            <small>Histórico</small>
          </button>
          <button class="bottom-nav__item" id="homeNav" type="button" data-pa-icon="home">
            <svg class="app-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-4.5v-6h-5v6H5a1 1 0 0 1-1-1v-9.5Z"></path></svg>
            <small>Home</small>
          </button>
          <button class="bottom-nav__item bottom-nav__item--active" aria-current="page" id="profileNav" type="button" data-pa-icon="profile">
            <svg class="app-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path><path d="M5 20a7 7 0 0 1 14 0"></path></svg>
            <small>Perfil</small>
          </button>
        </nav>
      </section>
    </main>
    <script src="i18n.js?v=20260712-gemini5"></script>
    <script src="i18n-full.js?v=20260712-gemini5"></script>
    <script src="app-core.js?v=20260712-gemini5"></script>
    <script src="child-mode-guard.js?v=20260709-child1"></script>
    <script src="app-icons.js"></script>
    <script src="lembrete.js?v=20260709-reminderlimit7"></script>
  </body>
</html>
