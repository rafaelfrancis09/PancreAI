<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PancreAI - Perfil</title>
    <link rel="stylesheet" href="profile.css?v=20260709-child1" />
    <link rel="stylesheet" href="pancreai-theme.css?v=20260710-animations1" />
    <link rel="stylesheet" href="pancreai-linear.css?v=20260710-linear4" />
    <link rel="stylesheet" href="pancreai-runtime.css?v=20260710-runtime1" />
    <link rel="stylesheet" href="pancreai-stability.css?v=20260710-stable1" />
    <link rel="stylesheet" href="profile-followups.css?v=20260710-profile4" />
    <link rel="stylesheet" href="profile-modal-compact.css?v=20260710-compact1" />
  </head>
  <body>
    <main class="app" id="app">
      <section class="screen screen--profile" aria-label="Perfil">
        <header class="profile-header">
          <span class="brand-mark brand-mark--profile" aria-hidden="true"><span class="brand-mark__back"></span><span class="brand-mark__front"></span></span>
          <div>
            <h1>PancreAI</h1>
            <p>Configurações e preferências</p>
          </div>
        </header>

        <section class="responsible-entry child-only" id="responsibleEntry">
          <span class="responsible-entry__icon" data-pa-icon="security" aria-hidden="true"></span>
          <div>
            <h2>Área do Responsável</h2>
            <p>Esta área contém dados importantes do tratamento e configurações do cálculo.</p>
            <button class="responsible-entry__button" id="responsibleEntryBtn" type="button">Continuar como responsável</button>
          </div>
        </section>

        <section class="profile-group">
          <h2>Preferências</h2>
          <button class="profile-row" id="configNav" type="button">
            <span class="profile-row__icon" data-pa-icon="settings" aria-hidden="true">
              <svg class="app-icon" viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7Z"></path><path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 0 1 0 2.8l-.1.1a2 2 0 0 1-2.8 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-.2a1 1 0 0 0-.7-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 0 1-2.8 0l-.1-.1a2 2 0 0 1 0-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 0 1-2-2v-1a2 2 0 0 1 2-2h.2a1 1 0 0 0 .9-.7 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 0 1 0-2.8l.1-.1a2 2 0 0 1 2.8 0l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V4a2 2 0 0 1 2-2h1a2 2 0 0 1 2 2v.2a1 1 0 0 0 .7.9 1 1 0 0 0 1.1-.2l.1-.1a2 2 0 0 1 2.8 0l.1.1a2 2 0 0 1 0 2.8l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6H20a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-.2a1 1 0 0 0-.4 1.9"></path></svg>
            </span>
            <span class="profile-row__label">Meu Tratamento</span>
            <span class="profile-row__chevron">›</span>
          </button>
          <button class="profile-row" id="languageNav" type="button">
            <span class="profile-row__icon" data-pa-icon="globe" aria-hidden="true"></span>
            <span class="profile-row__label">Idioma</span>
            <span class="profile-row__chevron">›</span>
          </button>
          <button class="profile-row" id="unidadeNav" type="button">
            <span class="profile-row__icon" data-pa-icon="lipase" aria-hidden="true">
              <svg class="app-icon" viewBox="0 0 24 24"><path d="M4 20 20 4"></path><path d="M15 4h5v5"></path><path d="M4 9V4h5"></path><path d="M20 15v5h-5"></path><path d="M9 20H4v-5"></path></svg>
            </span>
            <span class="profile-row__label">Unidade de medida</span>
            <span class="profile-row__chevron">›</span>
          </button>
                    <div class="profile-row" id="childModeRow">
            <span class="profile-row__icon" data-pa-icon="child" aria-hidden="true">
              <svg class="app-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><path d="M9 10a3 3 0 0 1 6 0"></path><path d="M8 15c1.2-1 2.5-1.5 4-1.5s2.8.5 4 1.5"></path><path d="M10 9H8"></path><path d="M16 9h-2"></path></svg>
            </span>
            <span class="profile-row__text">
              <span class="profile-row__label">Modo infantil</span>
            </span>
            <label class="switch" aria-label="Modo infantil">
              <input type="checkbox" id="childModeToggle" />
              <span class="switch__track"></span>
            </label>
          </div>
        </section>

        <section class="profile-group">
          <h2>Notificações</h2>
          <button class="profile-row" id="remindersNav" type="button">
            <span class="profile-row__icon" data-pa-icon="bell" aria-hidden="true">
              <svg class="app-icon" viewBox="0 0 24 24"><path d="M15 17H5a2 2 0 0 1-2-2V7"></path><path d="M18 8a4 4 0 0 0-8 0v1.5c0 .9-.3 1.7-.9 2.3L8 13h12l-1.1-1.2a3.3 3.3 0 0 1-.9-2.3V8"></path><path d="M14 17a2 2 0 1 1-4 0"></path></svg>
            </span>
            <span class="profile-row__label">Lembretes de refeições</span>
            <span class="profile-row__chevron">›</span>
          </button>
        </section>

        <section class="profile-group">
          <h2>Segurança</h2>
          <div class="profile-row">
            <span class="profile-row__icon" data-pa-icon="security" aria-hidden="true">
              <svg class="app-icon" viewBox="0 0 24 24"><path d="M12 3 5 6v5c0 4.6 2.7 8.8 7 10 4.3-1.2 7-5.4 7-10V6l-7-3Z"></path><path d="m9.5 12 1.8 1.8L14.8 10"></path></svg>
            </span>
            <span class="profile-row__label">Avisos médicos</span>
            <label class="switch" aria-label="Avisos médicos">
              <input type="checkbox" id="medicalAlertsToggle" />
              <span class="switch__track"></span>
            </label>
          </div>
        </section>

        <section class="profile-group">
          <h2>Sobre</h2>
          <button class="profile-row" id="favoritesNav" type="button">
            <span class="profile-row__icon" data-pa-icon="heart" aria-hidden="true">
              <svg class="app-icon" viewBox="0 0 24 24"><path d="m12 20-1.4-1.2C5.4 14.2 2 11.1 2 7.3A4.3 4.3 0 0 1 6.3 3c1.9 0 3 .9 3.7 2 .7-1.1 1.8-2 3.7-2A4.3 4.3 0 0 1 18 7.3c0 3.8-3.4 6.9-8.6 11.5L12 20Z"></path></svg>
            </span>
            <span class="profile-row__label">Refeições favoritas</span>
            <span class="profile-row__chevron">›</span>
          </button>
          <button class="profile-row" id="tutorialNav" type="button">
            <span class="profile-row__icon" data-pa-icon="book" aria-hidden="true">
              <svg class="app-icon" viewBox="0 0 24 24"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4H20v16H6.5A2.5 2.5 0 0 0 4 22V6.5Z"></path><path d="M20 20H6.5A2.5 2.5 0 0 0 4 22"></path><path d="M8 8h7"></path><path d="M8 12h7"></path></svg>
            </span>
            <span class="profile-row__label">Tutorial de fotos</span>
            <span class="profile-row__chevron">›</span>
          </button>
          <button class="profile-row" id="reportNav" type="button">
            <span class="profile-row__icon" data-pa-icon="report" aria-hidden="true">
              <svg class="app-icon" viewBox="0 0 24 24"><path d="M7 3h7l5 5v13H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"></path><path d="M14 3v5h5"></path><path d="M9 17h6"></path><path d="M9 13h6"></path></svg>
            </span>
            <span class="profile-row__label">Relatório médico</span>
            <span class="profile-row__chevron">›</span>
          </button>
          <button class="profile-row" id="aboutNav" type="button">
            <span class="profile-row__icon" data-pa-icon="info" aria-hidden="true">
              <svg class="app-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><path d="M12 10v6"></path><path d="M12 7h.01"></path></svg>
            </span>
            <span class="profile-row__label">Sobre e funcionamento</span>
            <span class="profile-row__chevron">›</span>
          </button>
          <button class="profile-row" id="termsNav" type="button">
            <span class="profile-row__icon" data-pa-icon="pdf" aria-hidden="true">
              <svg class="app-icon" viewBox="0 0 24 24"><path d="M7 3h7l5 5v13H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"></path><path d="M14 3v5h5"></path><path d="M9 11h6"></path><path d="M9 15h6"></path></svg>
            </span>
            <span class="profile-row__label">Termos de uso</span>
            <span class="profile-row__chevron">›</span>
          </button>
        </section>

        <nav class="bottom-nav" aria-label="Navegação inferior">
          <button class="bottom-nav__item" id="historyNav" type="button" data-pa-icon="history">
            <svg class="app-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v5h5"></path><path d="M12 7v5l3 2"></path></svg>
            <small>Histórico</small>
          </button>
          <button class="bottom-nav__item" id="homeNav" type="button" data-pa-icon="home">
            <svg class="app-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-4.5v-6h-5v6H5a1 1 0 0 1-1-1v-9.5Z"></path></svg>
            <small>Home</small>
          </button>
          <button class="bottom-nav__item bottom-nav__item--active" aria-current="page" type="button" data-pa-icon="profile">
            <svg class="app-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path><path d="M5 20a7 7 0 0 1 14 0"></path></svg>
            <small>Perfil</small>
          </button>
        </nav>
      </section>

      <section class="profile-modal" id="profileModal" hidden aria-hidden="true" aria-label="Confirmação">
        <button class="profile-modal__overlay" id="profileModalCancelOverlay" type="button" aria-label="Cancelar"></button>
        <article class="profile-modal__card" role="dialog" aria-modal="true" aria-labelledby="profileModalTitle">
          <h2 id="profileModalTitle">Ativar Modo Infantil?</h2>
          <p id="profileModalText">O app vai mostrar apenas o essencial para revisar refeições.</p>
          <div class="profile-modal__actions">
            <button class="profile-modal__button profile-modal__button--secondary" id="profileModalCancel" type="button">Cancelar</button>
            <button class="profile-modal__button profile-modal__button--primary" id="profileModalConfirm" type="button">Ativar</button>
          </div>
        </article>
      </section>
    </main>
    <script src="i18n.js?v=20260712-gemini5"></script>
    <script src="i18n-full.js?v=20260713-model1"></script>
    <script src="app-core.js?v=20260712-gemini5"></script>
    <script src="app-icons.js"></script>
    <script src="profile.js?v=20260709-child2"></script>
  </body>
</html>
